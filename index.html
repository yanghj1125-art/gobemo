<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고배모 경기 진행 대진표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        textarea {
            resize: vertical;
            min-height: 200px;
        }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .print-break { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen pb-10">

    <div class="max-w-4xl mx-auto pt-8 px-4">
        <!-- 헤더 -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-700 mb-2">🏸 고배모 경기 진행 🏸</h1>
            <p class="text-gray-600 text-sm">양 팀의 명단을 실력순(위에서부터 잘하는 순)으로 입력해주세요.</p>
        </div>

        <!-- 입력 영역 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8 no-print">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- A팀 입력 -->
                <div>
                    <label class="block text-lg font-semibold text-blue-600 mb-2">A팀 명단</label>
                    <textarea id="teamA" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="1. 최강자&#10;2. 김배민&#10;3. 이민턴&#10;4. 박스매시"></textarea>
                    <p class="text-xs text-gray-500 mt-1 text-right">총 인원: <span id="countA" class="font-bold">0</span>명</p>
                </div>
                <!-- B팀 입력 -->
                <div>
                    <label class="block text-lg font-semibold text-red-600 mb-2">B팀 명단</label>
                    <textarea id="teamB" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="1. 홍길동&#10;2. 이순신&#10;3. 강감찬&#10;4. 유관순"></textarea>
                    <p class="text-xs text-gray-500 mt-1 text-right">총 인원: <span id="countB" class="font-bold">0</span>명</p>
                </div>
            </div>

            <div class="mt-6 flex justify-center gap-4 no-print">
                <button onclick="resetAll()" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-3 px-6 rounded-full shadow transition duration-200">
                    초기화
                </button>
                <button onclick="generateBracket()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition duration-200 transform hover:scale-105">
                    대진 만들기
                </button>
            </div>
        </div>

        <!-- 대진표 결과 출력 영역 -->
        <div id="resultArea" class="hidden">
            <div class="flex flex-col sm:flex-row justify-between items-end mb-4 print-break">
                <h2 class="text-2xl font-bold text-gray-800 mb-2 sm:mb-0">📋 경기 대진표</h2>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-500 hidden sm:inline">총 5라운드 진행</span>
                    <button onclick="generateBracket()" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-semibold py-1.5 px-4 rounded shadow-sm text-sm no-print transition-colors">
                        🔄 다시 편성
                    </button>
                </div>
            </div>
            
            <div id="roundsContainer" class="space-y-6">
                <!-- 라운드 렌더링 영역 -->
            </div>
        </div>

        <!-- 실시간 경기 결과 (항상 하단에 표시) -->
        <div id="finalResultArea" class="hidden mt-12 bg-white rounded-xl shadow-lg p-6 border-t-4 border-indigo-500 print-break">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">🏆 실시간 경기 결과</h2>
            
            <!-- 팀 종합 스코어 -->
            <div class="flex justify-center items-center gap-8 mb-8">
                <div class="text-center">
                    <div class="text-lg font-bold text-blue-600">A팀</div>
                    <div id="scoreA" class="text-5xl font-black text-blue-700 mt-2">0</div>
                </div>
                <div class="text-3xl font-bold text-gray-300">VS</div>
                <div class="text-center">
                    <div class="text-lg font-bold text-red-600">B팀</div>
                    <div id="scoreB" class="text-5xl font-black text-red-700 mt-2">0</div>
                </div>
            </div>

            <!-- 개인별 성적 표 -->
            <div>
                <h3 class="text-lg font-bold text-gray-700 mb-3">개인별 승률 (승률 순)</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-gray-500">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                            <tr>
                                <th scope="col" class="px-4 py-3 text-center">팀</th>
                                <th scope="col" class="px-4 py-3">이름</th>
                                <th scope="col" class="px-4 py-3 text-center">경기수</th>
                                <th scope="col" class="px-4 py-3 text-center text-blue-600">승</th>
                                <th scope="col" class="px-4 py-3 text-center text-red-600">패</th>
                                <th scope="col" class="px-4 py-3 text-center">승률</th>
                            </tr>
                        </thead>
                        <tbody id="playerStatsBody">
                            <!-- 선수 스탯 렌더링 영역 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 전역 상태 관리
        let globalTournamentState = {
            rounds: [],
            teamA: [],
            teamB: []
        };

        // 초기화 (리셋) 기능
        function resetAll() {
            if(confirm("입력된 명단과 진행 중인 경기 결과가 모두 삭제됩니다. 초기화하시겠습니까?")) {
                document.getElementById('teamA').value = '';
                document.getElementById('teamB').value = '';
                updateCount('teamA', 'countA');
                updateCount('teamB', 'countB');
                
                document.getElementById('resultArea').classList.add('hidden');
                document.getElementById('finalResultArea').classList.add('hidden');
                
                globalTournamentState = { rounds: [], teamA: [], teamB: [] };
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // 인원 수 업데이트
        function updateCount(inputId, countId) {
            const lines = document.getElementById(inputId).value.split('\n').filter(line => line.trim() !== '');
            document.getElementById(countId).innerText = lines.length;
        }

        document.getElementById('teamA').addEventListener('input', () => updateCount('teamA', 'countA'));
        document.getElementById('teamB').addEventListener('input', () => updateCount('teamB', 'countB'));

        function getTeamData(inputId) {
            const lines = document.getElementById(inputId).value.split('\n').filter(line => line.trim() !== '');
            return lines.map((name, index) => ({
                name: name.trim(),
                originalRank: index
            }));
        }

        // 슬롯 채우기 (홀수 인원 시 추가 배정)
        function fillRoundSlots(team, requiredSlots, playCounts) {
            let selected = [...team];
            selected.forEach(p => playCounts[p.name]++);

            let extrasNeeded = requiredSlots - selected.length;
            if (extrasNeeded > 0) {
                let availableExtras = [...team].sort((a, b) => {
                    if (playCounts[a.name] !== playCounts[b.name]) {
                        return playCounts[a.name] - playCounts[b.name];
                    }
                    return a.originalRank - b.originalRank;
                });

                for (let i = 0; i < extrasNeeded; i++) {
                    let p = availableExtras[i % availableExtras.length];
                    selected.push({ ...p, isExtra: true });
                    playCounts[p.name]++;
                }
            }
            return selected.sort((a, b) => a.originalRank - b.originalRank);
        }

        // 파트너 매칭 알고리즘
        function formPairs(players, history) {
            let pairs = [];
            let unassigned = [...players];

            while (unassigned.length >= 2) {
                let p1 = unassigned.shift();
                let bestP2Idx = 0;
                let bestScore = Infinity;

                for (let i = 0; i < unassigned.length; i++) {
                    let p2 = unassigned[i];
                    let pairKey = [p1.name, p2.name].sort().join("|");
                    let timesPartnered = history[pairKey] || 0;
                    let rankDiff = Math.abs(p1.originalRank - p2.originalRank);
                    let score = (timesPartnered * 10000) + rankDiff;
                    
                    if (score < bestScore) {
                        bestScore = score;
                        bestP2Idx = i;
                    }
                }

                let p2 = unassigned.splice(bestP2Idx, 1)[0];
                pairs.push([p1, p2]);
                let finalKey = [p1.name, p2.name].sort().join("|");
                history[finalKey] = (history[finalKey] || 0) + 1;
            }
            return pairs;
        }

        // 대진 생성
        function generateBracket() {
            let hasStarted = false;
            if (globalTournamentState.rounds.length > 0) {
                for (let r of globalTournamentState.rounds) {
                    for (let m of r) {
                        if (m.winner !== null) hasStarted = true;
                    }
                }
            }

            if (hasStarted) {
                if (!confirm("이미 승패가 기록된 경기가 있습니다. 대진을 다시 편성하면 기존 점수 기록이 모두 초기화됩니다. 진행하시겠습니까?")) {
                    return;
                }
            }

            const teamA = getTeamData('teamA');
            const teamB = getTeamData('teamB');

            if (teamA.length < 2 || teamB.length < 2) {
                alert("각 팀에 최소 2명 이상의 명단을 입력해주세요.");
                return;
            }

            globalTournamentState.teamA = teamA;
            globalTournamentState.teamB = teamB;

            const maxTeamSize = Math.max(teamA.length, teamB.length);
            const matchesPerRound = Math.ceil(maxTeamSize / 2);
            const slotsPerTeam = matchesPerRound * 2;

            const playCountsA = {};
            const playCountsB = {};
            teamA.forEach(p => playCountsA[p.name] = 0);
            teamB.forEach(p => playCountsB[p.name] = 0);

            const partnerHistoryA = {};
            const partnerHistoryB = {};

            const rounds = [];

            for (let r = 1; r <= 5; r++) {
                let roundPlayersA = fillRoundSlots(teamA, slotsPerTeam, playCountsA);
                let roundPlayersB = fillRoundSlots(teamB, slotsPerTeam, playCountsB);

                let pairsA = formPairs(roundPlayersA, partnerHistoryA);
                let pairsB = formPairs(roundPlayersB, partnerHistoryB);

                const addAvgRank = (pairs) => {
                    return pairs.map(pair => {
                        let avg = (pair[0].originalRank + pair[1].originalRank) / 2;
                        return { pair, avgRank: avg };
                    }).sort((a, b) => a.avgRank - b.avgRank);
                };

                let sortedPairsA = addAvgRank(pairsA);
                let sortedPairsB = addAvgRank(pairsB);

                // 4라운드, 5라운드 매칭 다변화 (비슷한 실력대에서 상대 스왑)
                if (r === 4 || r === 5) {
                    for (let i = 0; i < sortedPairsB.length - 1; i += 2) {
                        let temp = sortedPairsB[i];
                        sortedPairsB[i] = sortedPairsB[i+1];
                        sortedPairsB[i+1] = temp;
                    }
                }

                let roundMatches = [];
                for (let i = 0; i < matchesPerRound; i++) {
                    roundMatches.push({
                        teamA: sortedPairsA[i].pair,
                        teamB: sortedPairsB[i].pair,
                        winner: null // 승패 기록용 상태 추가
                    });
                }
                rounds.push(roundMatches);
            }

            globalTournamentState.rounds = rounds;
            renderBracket();
            updateRealTimeResults(); // 초기 결과창 띄우기
        }

        // 대진표 화면에 그리기
        function renderBracket() {
            const container = document.getElementById('roundsContainer');
            container.innerHTML = ''; 

            globalTournamentState.rounds.forEach((matches, roundIndex) => {
                const roundDiv = document.createElement('div');
                roundDiv.className = 'bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden print-break';
                
                const header = document.createElement('div');
                header.className = 'bg-gray-50 border-b border-gray-200 px-4 py-3 font-bold text-gray-700';
                header.innerText = `🏸 ${roundIndex + 1} 라운드`;
                roundDiv.appendChild(header);

                const matchList = document.createElement('div');
                matchList.className = 'divide-y divide-gray-100';

                matches.forEach((match, matchIndex) => {
                    const matchItem = document.createElement('div');
                    matchItem.className = 'flex flex-col md:flex-row items-center justify-between p-4 hover:bg-gray-50 gap-4 md:gap-0';

                    // 경기 번호
                    const matchNum = document.createElement('div');
                    matchNum.className = 'text-xs text-gray-400 font-semibold w-full md:w-16 text-center md:text-left mb-2 md:mb-0';
                    matchNum.innerText = `Game ${matchIndex + 1}`;

                    // A팀 영역 (승리 버튼 + 이름)
                    const teamAbox = document.createElement('div');
                    teamAbox.className = 'flex-1 flex items-center justify-center md:justify-end gap-3 w-full';
                    
                    const btnA = document.createElement('button');
                    btnA.id = `btn-${roundIndex}-${matchIndex}-A`;
                    btnA.className = `px-3 py-1 text-xs font-bold rounded shadow-sm border transition-colors ${match.winner === 'A' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-blue-600 border-blue-200 hover:bg-blue-50'}`;
                    btnA.innerText = match.winner === 'A' ? '승리 ★' : '승리';
                    btnA.onclick = () => toggleWinner(roundIndex, matchIndex, 'A');

                    const namesA = document.createElement('div');
                    namesA.className = `text-center md:text-right font-medium ${match.winner === 'B' ? 'text-gray-400' : 'text-blue-800'}`;
                    namesA.innerHTML = `${match.teamA[0].name} <span class="text-gray-400 text-xs mx-0.5">&</span> ${match.teamA[1].name}`;

                    teamAbox.appendChild(btnA);
                    teamAbox.appendChild(namesA);

                    // VS 마크
                    const vsMark = document.createElement('div');
                    vsMark.className = 'bg-gray-200 text-gray-600 text-xs font-bold px-2 py-1 rounded-md hidden md:block mx-4';
                    vsMark.innerText = 'VS';

                    // B팀 영역 (이름 + 승리 버튼)
                    const teamBbox = document.createElement('div');
                    teamBbox.className = 'flex-1 flex items-center justify-center md:justify-start gap-3 w-full';
                    
                    const namesB = document.createElement('div');
                    namesB.className = `text-center md:text-left font-medium ${match.winner === 'A' ? 'text-gray-400' : 'text-red-800'}`;
                    namesB.innerHTML = `${match.teamB[0].name} <span class="text-gray-400 text-xs mx-0.5">&</span> ${match.teamB[1].name}`;

                    const btnB = document.createElement('button');
                    btnB.id = `btn-${roundIndex}-${matchIndex}-B`;
                    btnB.className = `px-3 py-1 text-xs font-bold rounded shadow-sm border transition-colors ${match.winner === 'B' ? 'bg-red-600 text-white border-red-600' : 'bg-white text-red-600 border-red-200 hover:bg-red-50'}`;
                    btnB.innerText = match.winner === 'B' ? '승리 ★' : '승리';
                    btnB.onclick = () => toggleWinner(roundIndex, matchIndex, 'B');

                    teamBbox.appendChild(namesB);
                    teamBbox.appendChild(btnB);

                    matchItem.appendChild(matchNum);
                    matchItem.appendChild(teamAbox);
                    matchItem.appendChild(vsMark);
                    matchItem.appendChild(teamBbox);
                    matchList.appendChild(matchItem);
                });

                roundDiv.appendChild(matchList);
                container.appendChild(roundDiv);
            });

            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('finalResultArea').classList.remove('hidden');
        }

        // 승리 팀 토글 기능
        function toggleWinner(roundIdx, matchIdx, teamStr) {
            let match = globalTournamentState.rounds[roundIdx][matchIdx];
            
            // 이미 선택된 것을 다시 누르면 취소, 아니면 변경
            if (match.winner === teamStr) {
                match.winner = null;
            } else {
                match.winner = teamStr;
            }
            
            // UI 재렌더링
            renderBracket();
            updateRealTimeResults();
        }

        // 실시간 결과 집계 및 업데이트
        function updateRealTimeResults() {
            let totalA = 0;
            let totalB = 0;
            let stats = {}; // { '팀-이름': { team, name, play, win, lose } }

            // 선수 스탯 초기화
            globalTournamentState.teamA.forEach(p => {
                stats[`A-${p.name}`] = { team: 'A', name: p.name, play: 0, win: 0, lose: 0 };
            });
            globalTournamentState.teamB.forEach(p => {
                stats[`B-${p.name}`] = { team: 'B', name: p.name, play: 0, win: 0, lose: 0 };
            });

            // 결과 집계
            globalTournamentState.rounds.forEach(round => {
                round.forEach(match => {
                    // 출전 횟수 증가
                    match.teamA.forEach(p => { if(stats[`A-${p.name}`]) stats[`A-${p.name}`].play++; });
                    match.teamB.forEach(p => { if(stats[`B-${p.name}`]) stats[`B-${p.name}`].play++; });

                    if (match.winner === 'A') {
                        totalA++;
                        match.teamA.forEach(p => { if(stats[`A-${p.name}`]) stats[`A-${p.name}`].win++; });
                        match.teamB.forEach(p => { if(stats[`B-${p.name}`]) stats[`B-${p.name}`].lose++; });
                    } else if (match.winner === 'B') {
                        totalB++;
                        match.teamB.forEach(p => { if(stats[`B-${p.name}`]) stats[`B-${p.name}`].win++; });
                        match.teamA.forEach(p => { if(stats[`A-${p.name}`]) stats[`A-${p.name}`].lose++; });
                    }
                });
            });

            // 스코어 보드 업데이트
            document.getElementById('scoreA').innerText = totalA;
            document.getElementById('scoreB').innerText = totalB;

            // 스탯 배열로 변환 후 정렬 (승률 > 승리수 > 경기수 > 팀순)
            let statArray = Object.values(stats);
            statArray.sort((a, b) => {
                let rateA = a.play > 0 ? a.win / a.play : 0;
                let rateB = b.play > 0 ? b.win / b.play : 0;
                if (rateB !== rateA) return rateB - rateA; // 승률 내림차순
                if (b.win !== a.win) return b.win - a.win; // 승리수 내림차순
                if (b.play !== a.play) return b.play - a.play; // 경기수 내림차순
                return a.team.localeCompare(b.team);
            });

            // 테이블 렌더링
            const tbody = document.getElementById('playerStatsBody');
            tbody.innerHTML = '';
            
            statArray.forEach(st => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white border-b hover:bg-gray-50';
                
                let rateStr = st.play > 0 ? Math.round((st.win / st.play) * 100) + '%' : '0%';
                let teamColor = st.team === 'A' ? 'text-blue-600 bg-blue-50' : 'text-red-600 bg-red-50';
                
                tr.innerHTML = `
                    <td class="px-4 py-2 text-center font-bold ${teamColor} rounded-l">${st.team}</td>
                    <td class="px-4 py-2 font-medium text-gray-900">${st.name}</td>
                    <td class="px-4 py-2 text-center">${st.play}</td>
                    <td class="px-4 py-2 text-center text-blue-600 font-bold">${st.win}</td>
                    <td class="px-4 py-2 text-center text-red-600 font-bold">${st.lose}</td>
                    <td class="px-4 py-2 text-center font-black text-gray-700">${rateStr}</td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
